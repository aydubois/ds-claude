@for (option of options(); track option.value; let i = $index) {
  <button
    type="button"
    class="ay-segment-option"
    role="radio"
    [class.ay-segment-option--selected]="value() === option.value"
    [class.ay-segment-option--disabled]="option.disabled || disabled()"
    [attr.aria-checked]="value() === option.value"
    [attr.aria-disabled]="option.disabled || disabled()"
    [tabindex]="(value() === option.value && !option.disabled && !disabled()) ? 0 : -1"
    [disabled]="option.disabled || disabled()"
    (click)="select(option)"
    (keydown)="onKeydown($event, i)"
  >
    {{ option.label }}
  </button>
}
