<div class="ay-input-wrapper">
  @if (prefixIcon()) {
    <ay-icon [name]="prefixIcon()" class="ay-input-prefix" />
  }
  <input
    #inputEl
    class="ay-input"
    [id]="inputId()"
    [type]="type()"
    [value]="value()"
    [disabled]="disabled()"
    [required]="required()"
    [attr.aria-describedby]="describedBy()"
    [attr.aria-invalid]="!!error()"
    [attr.placeholder]="' '"
    (input)="onInput($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
  />
  <label class="ay-input-label" [attr.for]="inputId()">
    {{ label() }}
    @if (required()) {
      <span class="ay-input-required" aria-hidden="true">*</span>
    }
  </label>
  @if (showClear()) {
    <button
      class="ay-input-action ay-input-clear"
      type="button"
      tabindex="-1"
      aria-label="Effacer"
      (mousedown)="onClear($event)"
    >
      <ay-icon name="close" />
    </button>
  } @else if (suffixIcon()) {
    <button
      class="ay-input-action ay-input-suffix"
      type="button"
      tabindex="-1"
      [attr.aria-label]="suffixIcon()"
      (mousedown)="onSuffixClick($event)"
    >
      <ay-icon [name]="suffixIcon()" />
    </button>
  }
</div>
@if (error()) {
  <span class="ay-input-error" [id]="errorId()">{{ error() }}</span>
} @else if (helper()) {
  <span class="ay-input-helper" [id]="helperId()">{{ helper() }}</span>
}
