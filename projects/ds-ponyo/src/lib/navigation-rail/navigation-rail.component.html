<button
  *ngIf="collapsible"
  type="button"
  class="ay-nav-rail-toggle"
  [attr.aria-label]="collapsed ? 'Déplier la navigation' : 'Replier la navigation'"
  [attr.title]="collapsed ? 'Déplier' : 'Replier'"
  (click)="toggleCollapse()"
>
  <ay-icon [name]="collapsed ? 'chevron-right' : 'chevron-left'"></ay-icon>
</button>
<ul class="ay-nav-rail-list">
  <li *ngFor="let item of items" class="ay-nav-rail-item">
    <a
      class="ay-nav-rail-link"
      [href]="item.href"
      [class.ay-nav-rail-link--active]="isActive(item)"
      [attr.aria-current]="isActive(item) ? 'page' : null"
      [attr.title]="collapsed ? item.label : null"
      (click)="select(item, $event)"
    >
      <ay-icon [name]="item.icon" class="ay-nav-rail-icon"></ay-icon>
      <span *ngIf="!collapsed" class="ay-nav-rail-label">{{ item.label }}</span>
    </a>
  </li>
</ul>
