<ng-container *ngIf="snackbarService.snackbar as snackbar">
  <div
    class="ay-snackbar"
    role="status"
    aria-live="polite"
  >
    <span class="ay-snackbar-message">{{ snackbar.message }}</span>
    <button
      *ngIf="snackbar.action"
      class="ay-snackbar-action"
      type="button"
      (click)="snackbarService.triggerAction()"
    >{{ snackbar.action }}</button>
    <button
      class="ay-snackbar-close"
      type="button"
      aria-label="Fermer"
      (click)="snackbarService.dismiss()"
    >&times;</button>
  </div>
</ng-container>
